display_name: DESA - Data Extraction Structuring Agent
short_description: Extracts structured records from unstructured sources against a defined schema, scoring each field by confidence level and flagging empty required fields and schema mismatches before passing records downstream.
default_prompt: Use DESA to extract structured records from a source document against a defined schema — score each field by confidence, flag all Low or empty required fields, and attach the flag log before routing records downstream.
