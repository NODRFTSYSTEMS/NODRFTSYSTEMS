name: PharmacyOS CI

# Runs typecheck + lint + test + build on every PR + push to main that
# touches the pharmacyos workspace. All checks must pass before merge.

on:
  push:
    branches: [main]
    paths:
      - '04_products/pharmacyos/app/**'
      - '.github/workflows/pharmacyos-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - '04_products/pharmacyos/app/**'
      - '.github/workflows/pharmacyos-ci.yml'

defaults:
  run:
    working-directory: 04_products/pharmacyos/app

jobs:
  ci:
    name: typecheck + lint + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '04_products/pharmacyos/app/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc -b --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload bundle (for size inspection on PRs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'pull_request'
        with:
          name: pharmacyos-dist-${{ github.sha }}
          path: 04_products/pharmacyos/app/dist
          retention-days: 7
